# openspec/config.yaml
schema: spec-driven

context: |
  Tech stack: TypeScript, pnpm monorepo, Astro (docs), Vitest (testing)
  Architecture: Workspace-based monorepo with packages/ and examples/
  Testing: Vitest with jsdom for browser environment simulation
  Style: Biome (formatter + linter), tab indentation, double quotes
  Build: tsup for package bundling, semantic-release for versioning
  CI: GitHub Actions with dependabot and renovate for dependency updates

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected packages in the monorepo
    - Consider impact on both Node.js and browser exports
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - Cover both Node.js and browser environments when applicable
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
    - Consider monorepo workspace dependencies
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
    - Separate package changes from documentation changes
  apply:
    - Follow existing code patterns and conventions
    - Use Biome for formatting (tabs, double quotes)
    - Maintain dual exports (Node.js + browser)
    - Update tests alongside implementation
    tdd: true
    test_command: "pnpm test"
  verify:
    test_command: "pnpm test"
    build_command: "pnpm build"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas (large removals)
    - Update CHANGELOG.md if semantic-release is not handling it
